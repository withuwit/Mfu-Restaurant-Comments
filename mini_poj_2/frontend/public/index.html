<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Project App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Welcome to Mini Project App</h1>
    <form id="login-form" style="text-align:center; margin-top:30px;">
        <input type="text" id="username" placeholder="Username" required style="padding:8px; margin:5px;" />
        <input type="password" id="password" placeholder="Password" required style="padding:8px; margin:5px;" />
        <button type="submit" style="padding:8px 16px;">Login</button>
    </form>
    <div id="app"></div>
    <script src="../src/main.js"></script>
</body>
</html>
